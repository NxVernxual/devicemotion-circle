<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>devicemotion-circle</title>
<style>
  :root {
    --bg: #0a0b0d;
    --bg-panel: #111318;
    --border: #23262e;
    --text: #e8e6e1;
    --text-dim: #7a8090;
    --accent: #c9963a;
    --accent-dim: #7a5f26;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .grid-bg svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  body {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
    padding: 24px;
  }

  main {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    text-align: center;
  }

  .eyebrow {
    color: var(--accent-dim);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin: 0 0 10px;
  }

  h1 {
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 14px;
  }

  p.desc {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
    margin: 0 0 36px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  a.link-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 18px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
    text-align: left;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }

  a.link-btn:hover,
  a.link-btn:focus-visible {
    border-color: var(--accent-dim);
    transform: translateY(-1px);
  }

  a.link-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  a.link-btn:active {
    transform: translateY(0);
  }

  .link-label {
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }

  .link-tag {
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.08em;
  }

  .link-name {
    color: var(--text);
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bracket {
    color: var(--text-dim);
    font-size: 13px;
    flex-shrink: 0;
  }

  footer {
    margin-top: 40px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.03em;
  }

  @media (prefers-reduced-motion: reduce) {
    a.link-btn {
      transition: none;
    }
  }
</style>
</head>
